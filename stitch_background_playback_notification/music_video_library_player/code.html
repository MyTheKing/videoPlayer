<script data-purpose="event-handlers">
    // Subtle interaction simulation
    document.querySelectorAll('[data-purpose="video-item"]').forEach(item => {
      item.addEventListener('click', () => {
        console.log('视频点击:', item.querySelector('h3').textContent);
      });
    });

    const scanBtn = document.querySelector('[data-purpose="scan-button"]');
    scanBtn.addEventListener('click', () => {
      const originalText = scanBtn.innerHTML;
      scanBtn.innerHTML = '<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> 扫描中...';
      scanBtn.disabled = true;
      setTimeout(() => {
        scanBtn.innerHTML = originalText;
        scanBtn.disabled = false;
      }, 2000);
    });

<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Android 媒体通知栏</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-gradients">
    /* Deep background to mimic dark mode notification shade */
    .bg-notification-shade {
      background-color: #121212;
    }
    /* Media player card background */
    .bg-media-card {
      background-color: #2c2c2c;
    }
  </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4 font-sans text-white">
<!-- BEGIN: NotificationContainer -->
<main class="w-full max-w-sm" data-purpose="notification-center-mockup">
<!-- Status Bar Mockup -->
<div class="flex justify-between items-center px-4 py-2 text-xs opacity-70" data-purpose="status-bar">
<span>12:45</span>
<div class="flex gap-1">
<svg class="w-3 h-3" fill="currentColor" viewbox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 12.84L12 21.35z"></path></svg>
<svg class="w-3 h-3" fill="currentColor" viewbox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"></path></svg>
</div>
</div>
<!-- BEGIN: MediaNotificationCard -->
<section class="bg-media-card rounded-3xl p-4 shadow-2xl border border-white/5" data-purpose="media-controls-container">
<!-- Top Row: App Icon and Capability Info -->
<div class="flex justify-between items-center mb-4">
<div class="flex items-center gap-2">
<!-- App Logo Placeholder -->
<div class="w-6 h-6 bg-red-600 rounded-lg flex items-center justify-center">
<svg class="w-4 h-4 text-white" fill="currentColor" viewbox="0 0 24 24">
<path d="M10 15l5.19-3L10 9v6zM21.56 7.17c-.17-.62-.67-1.12-1.28-1.29C19.15 5.5 12 5.5 12 5.5s-7.15 0-8.28.38c-.62.17-1.11.67-1.28 1.29C2.11 8.3 2.11 12 2.11 12s0 3.7.39 4.83c.17.62.66 1.12 1.28 1.29 1.13.38 8.28.38 8.28.38s7.15 0 8.28-.38c.61-.17 1.11-.67 1.28-1.29.39-1.13.39-4.83.39-4.83s0-3.7-.39-4.83z"></path>
</svg>
</div>
<span class="text-xs font-medium text-gray-400">流媒体播放器 • 息屏听歌中</span>
</div>
<button class="text-gray-400 hover:text-white transition-colors">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<!-- Middle Content: Title and Thumbnail -->
<div class="flex gap-4 items-center mb-6">
<!-- Thumbnail -->
<div class="flex-shrink-0">
<img alt="视频缩略图" class="w-20 h-20 rounded-xl object-cover shadow-lg" data-purpose="video-thumbnail" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDLKQcMgq9bIDPDbKXeNHX486FdQI5NZpkYjWBXU59gakQ9W31l-8FyYcU2GjDjBqhJynnuM9Sed67b6jQHRZ476VXVl0rUy8xpn3Bd6aL_zylN2tq42YP-N6u-FFNO6PQrNwtnD8LrAPcOu2GOBmUn4MHoCS5_-iy3KCQMagjLXgcJLGH8LbAEH5MBPm7dY8MUJ7s2uBnPc1MWfLY-NoGpUZSnBCeaWBJyGSjTxgU6JmKAC05d3rFU7hYjApJ3ql58sB8EAVkp98U"/>
</div>
<!-- Metadata -->
<div class="flex-1 overflow-hidden">
<h2 class="font-bold text-lg truncate">极简主义 Lofi 节奏：深度专注</h2>
<p class="text-sm text-gray-400 truncate">Lofi Girl &amp; Chillhop Music</p>
</div>
</div>
<!-- Playback Progress Bar -->
<div class="w-full mb-6" data-purpose="playback-progress">
<div class="h-1 w-full bg-gray-600 rounded-full relative">
<div class="absolute left-0 top-0 h-full w-1/3 bg-white rounded-full"></div>
<!-- Seek Handle -->
<div class="absolute left-1/3 top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 bg-white rounded-full shadow-md"></div>
</div>
<div class="flex justify-between text-[10px] mt-2 text-gray-500 font-medium">
<span>04:20</span>
<span>12:00</span>
</div>
</div>
<!-- BEGIN: PlaybackControls -->
<div class="flex justify-between items-center px-4" data-purpose="playback-buttons">
<!-- Shuffle Button -->
<button aria-label="随机播放" class="text-gray-400 hover:text-white">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<!-- Previous -->
<button aria-label="上一首" class="p-2 hover:bg-white/10 rounded-full transition-colors">
<svg class="w-8 h-8" fill="currentColor" viewbox="0 0 24 24">
<path d="M6 6h2v12H6zm3.5 6L19 18V6z"></path>
</svg>
</button>
<!-- Play/Pause -->
<button aria-label="暂停" class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition-transform shadow-xl">
<svg class="w-10 h-10" fill="currentColor" viewbox="0 0 24 24">
<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
</svg>
</button>
<!-- Next -->
<button aria-label="下一首" class="p-2 hover:bg-white/10 rounded-full transition-colors">
<svg class="w-8 h-8" fill="currentColor" viewbox="0 0 24 24">
<path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"></path>
</svg>
</button>
<!-- Repeat Button -->
<button aria-label="循环播放" class="text-gray-400 hover:text-white">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
<!-- END: PlaybackControls -->
</section>
<!-- END: MediaNotificationCard -->
<!-- Quick Settings Placeholder Below -->
<div class="mt-4 grid grid-cols-4 gap-2 opacity-50">
<div class="h-10 bg-gray-800 rounded-full"></div>
<div class="h-10 bg-gray-800 rounded-full"></div>
<div class="h-10 bg-gray-800 rounded-full"></div>
<div class="h-10 bg-gray-800 rounded-full"></div>
</div>
</main>
<!-- END: NotificationContainer -->
</body></html>
